name: CLI Build

on:
  workflow_call:
    inputs:
      configuration:
        description: 'Build configuration (debug or release)'
        required: false
        type: string
        default: 'debug'
      upload-artifacts:
        description: 'Whether to upload build artifacts'
        required: false
        type: boolean
        default: false

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      AUTH_CLIENT_ID: ${{ secrets.CLI_AUTH_CLIENT_ID }}
      API_BASE_URL: https://storage.rxlab.app/api
    strategy:
      matrix:
        include:
          - arch: arm64
            swift-build-arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate OpenAPI spec
        run: |
          cd admin && bun install && bun run openapi:generate && cd ..
          cp admin/public/openapi.json cli/RxStorageCli/Sources/RxStorageCli/openapi.json

      - name: Generate build config
        run: ./scripts/cli-generate-config.sh

      - name: Build CLI
        run: |
          cd cli/RxStorageCli
          swift build -c ${{ inputs.configuration }} --arch ${{ matrix.swift-build-arch }}

      - name: Upload binary artifact
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: RxStorageCli-macos-${{ matrix.arch }}
          path: cli/RxStorageCli/.build/${{ inputs.configuration }}/RxStorageCli
          retention-days: 1

  build-linux:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    container: swift:6.2.0
    timeout-minutes: 30
    env:
      AUTH_CLIENT_ID: ${{ secrets.CLI_AUTH_CLIENT_ID }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            swift-sdk-arch: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            swift-sdk-arch: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Swift Static Linux SDK
        run: |
          swift sdk install https://download.swift.org/swift-6.2-release/static-sdk/swift-6.2-RELEASE/swift-6.2-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz --checksum d2225840e592389ca517bbf71652f7003dbf45ac35d1e57d98b9250368769378

      - name: Install Bun
        run: |
          apt-get update && apt-get install -y curl unzip
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Generate OpenAPI spec
        run: |
          cd admin && $HOME/.bun/bin/bun install && $HOME/.bun/bin/bun run openapi:generate && cd ..
          cp admin/public/openapi.json cli/RxStorageCli/Sources/RxStorageCli/openapi.json

      - name: Generate build config
        run: ./scripts/cli-generate-config.sh

      - name: Build CLI
        run: |
          cd cli/RxStorageCli
          swift build -c ${{ inputs.configuration }} --swift-sdk ${{ matrix.swift-sdk-arch }}-swift-linux-musl

      - name: Upload binary artifact
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: RxStorageCli-linux-${{ matrix.arch }}
          path: cli/RxStorageCli/.build/${{ inputs.configuration }}/RxStorageCli
          retention-days: 1

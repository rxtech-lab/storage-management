name: CLI CI

on:
  push:
    paths:
      - 'cli/**'
      - 'admin/public/openapi.json'
      - '.github/workflows/cli-ci.yml'
      - '.github/workflows/cli-build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build CLI
    uses: ./.github/workflows/cli-build.yml
    with:
      configuration: debug

  test:
    name: Test CLI
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate OpenAPI spec
        run: |
          cd admin && bun install && bun run openapi:generate && cd ..
          cp admin/public/openapi.json cli/RxStorageCli/Sources/RxStorageCli/openapi.json

      - name: Test
        run: |
          cd cli/RxStorageCli
          swift test

name: CLI Release

on:
  release:
    types: [released]

jobs:
  build:
    name: Build CLI
    uses: ./.github/workflows/cli-build.yml
    with:
      configuration: release
      upload-artifacts: true
    secrets: inherit

  upload-release:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Package binaries
        run: |
          # macOS arm64
          chmod +x artifacts/RxStorageCli-macos-arm64/RxStorageCli
          tar czf RxStorageCli-macos-arm64.tar.gz -C artifacts/RxStorageCli-macos-arm64 RxStorageCli

          # Linux x86_64
          chmod +x artifacts/RxStorageCli-linux-x86_64/RxStorageCli
          tar czf RxStorageCli-linux-x86_64.tar.gz -C artifacts/RxStorageCli-linux-x86_64 RxStorageCli

          # Linux arm64
          chmod +x artifacts/RxStorageCli-linux-arm64/RxStorageCli
          tar czf RxStorageCli-linux-arm64.tar.gz -C artifacts/RxStorageCli-linux-arm64 RxStorageCli

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            RxStorageCli-macos-arm64.tar.gz \
            RxStorageCli-linux-x86_64.tar.gz \
            RxStorageCli-linux-arm64.tar.gz \
            --repo "${{ github.repository }}"
